# ──────────────────────────────────────────────────────────────
# Netlify configuration for A2A Identity Chaining (Next.js 15)
# ──────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

# Netlify Next.js plugin — handles SSR, API routes, and SSE streaming
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Increase serverless function timeout.
# The 5-step A2A token chain makes sequential Okta API calls;
# free-tier max is 10 s, Pro max is 26 s.
[functions]
  node_bundler = "nft"
  timeout      = 26

# Redirect all unmatched paths to Next.js (required for dynamic routes)
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200
